# =========================================================================================
# AI Configuration Properties (ai.properties)
# =========================================================================================
# This file provides test and framework configuration specific to the AI agent execution.
# Below are properties to configure the direct parsing of non-LLM actions (like navigations).
# =========================================================================================

# The pattern used to detect instructions that merely attempt to navigate to a URL directly.
# The URL must be extracted in group 1.
neodymium.ai.agent.pattern.url = (?i)^(?:open|go\\s+to|navigate\\s+to|visit|[Öö]ffne|browse\\s+to)\\s+(https?://\\S+)\\s*$

# The pattern to detect direct Java method execution calls via the AI agent.
# Method name is extracted in group 1, and the parameters string in group 2.
neodymium.ai.agent.pattern.javaMethod = \\b([a-zA-Z_][a-zA-Z0-9_]*)\\s*\\(([^)]*)\\)

# The pattern to differentiate between general interactions and validation instructions.
neodymium.ai.agent.pattern.validation = (?i)^(?:verify|check|validate|ensure|assert|prüfe|verifiziere|überprüfe|bestätige|checke)\\b.*

# The pattern to detect an instruction that signifies navigating back in the browser.
neodymium.ai.agent.pattern.back = (?i)^(?:go\\s+)?back$|^navigate\\s+back$

# The pattern to detect an instruction that signifies navigating forward in the browser.
neodymium.ai.agent.pattern.forward = (?i)^(?:go\\s+)?forward$|^navigate\\s+forward$

# The pattern to detect an instruction that signifies refreshing or reloading the page.
neodymium.ai.agent.pattern.refresh = (?i)^(?:refresh|reload)(?:\\s+page)?$

# The pattern to detect an instruction that signifies clearing all cookies from the browser.
neodymium.ai.agent.pattern.clearCookies = (?i)^(?:clear\\s+cookies|reset\\s+session|clear\\s+all\\s+cookies)$

# =========================================================================================
# AI Test Prompt Generation
# =========================================================================================

# Enables the AI Test Prompt generation feature. Must be explicitly set to true 
# to run @NeodymiumTestGenerator annotated exploratory AI runs.
neodymium.ai.generate = false

# =========================================================================================
# Pre-Execution Static Analysis Phase (PESAP) Custom Prompt Rules
# =========================================================================================
# Path to a custom rules file to extend the PESAP semantic linter.
# The value is resolved first as a classpath resource, then as a filesystem path.
# Examples:
# - Classpath resource: ai-prompts/my-custom-rules.md
# - Filesystem path: config/pesap-custom-rules.md
# By default, falls back to config/pesap-custom-rules.txt (filesystem) or
# ai-prompts/pesap-custom-rules.txt (classpath) if empty.
#neodymium.ai.pesap.custom.file = 
#neodymium.ai.apiKey =

# =========================================================================================
# AI Semantic Assertion Configuration (LlmMode.ASSERT)
# =========================================================================================
# Dedicated configuration settings for secondary LLM evaluation/assertions (LlmAssert).
# If not specified, the standard properties (API key, model, timeout) are used as fallback.

# API key to use for assertion LLM calls.
#neodymium.ai.assertion.apiKey =

# Model name to use for assertion LLM calls.
neodymium.ai.assertion.model = gemini-2.5-flash

# Temperature to use for assertion LLM calls.
#neodymium.ai.assertion.temperature = 0.0

# Timeout in seconds for assertion LLM calls.
#neodymium.ai.assertion.timeoutSeconds = 180

# =========================================================================================
# Secure Java Method Reflector Configuration
# =========================================================================================
# Comma-separated list of fully qualified class names that the JAVA_METHOD action
# plugin should scan for static utility methods when a method is not found on the test
# instance itself. All methods must be public static and annotated with @AiMethod.
neodymium.ai.agent.methods.classes = com.xceptance.neodymium.ai.util.AiAssertions

# Comma-separated list of package names to scan for public static utility classes
# containing methods annotated with @AiMethod.
neodymium.ai.agent.methods.packages = 

# =========================================================================================
# Playbook Directory Configuration
# =========================================================================================
# Specifies the global directory path where recorded AI playbooks are loaded from and saved to.
# Default is src/test/resources/ai-playbooks/
playbook.directory.global = src/test/resources/ai-playbooks/