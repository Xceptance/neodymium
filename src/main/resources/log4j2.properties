##############################################################################
##
## log4j Settings
##
## The log4j configuration used by Neodymium when running the tests.
##
##############################################################################
#
### Logger definitions ###

status = INFO
name = NeodymiumConfiguration

property.filename = target/log/neodymium-error.log

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %p - %c{1.}: %m%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = trace
 
appender.file.type = File
appender.file.name = FILE
appender.file.append = true
appender.file.fileName = ${filename}
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d %p - %c{1.} [%t]: %m%n
appender.file.filter.threshold.type = ThresholdFilter
appender.file.filter.threshold.level = error

appender.ai_file.type = File
appender.ai_file.name = AI_FILE
appender.ai_file.append = true
appender.ai_file.fileName = target/neodymium-ai.log
appender.ai_file.layout.type = PatternLayout
appender.ai_file.layout.pattern = %d %p - %c{1.} [%t]: %m%n

logger.neodymium_ai.name = com.xceptance.neodymium.ai
logger.neodymium_ai.level = debug
logger.neodymium_ai.additivity = false
logger.neodymium_ai.appenderRef.ai.ref = AI_FILE
logger.neodymium_ai.appenderRef.console.ref = STDOUT
logger.neodymium_ai.appenderRef.console.level = info
logger.neodymium_ai.appenderRef.file.ref = FILE
logger.neodymium_ai.appenderRef.file.level = error

rootLogger.level = INFO
rootLogger.appenderRef.file.ref = FILE
rootLogger.appenderRef.console.ref = STDOUT
