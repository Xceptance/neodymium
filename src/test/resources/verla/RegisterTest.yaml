steps: |
  Open ${verla.url}/verla-${quality}/index.html
  Select "${country}" from the country dropdown.
  Goto to 'Login'.
  Click the "Register" link.
  Type "${email}" into the email address field, "${password}" into the password field and "${password}" into the confirm password field.
  Click the "Register" button.
  The page will show a small dashboard, a logout link, and a headline named order history.
  Visually, you will see a bordered area on the left with text and icons, as well as a white area on the right (visual).

