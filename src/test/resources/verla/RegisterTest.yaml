steps: |
  Open http://localhost:44444/verla-${quality}/index.html
  Select "${country}" from the country dropdown.
  Click the "My Account" link.
  Click the "Register" link.
  Type "${firstName}" into the first name field.
  Type "${lastName}" into the last name field.
  Type "${email}" into the email address field.
  Type "${password}" into the password field.
  Type "${password}" into the confirm password field.
  Click the "Register" button.
  Assert that the page contains "Welcome, ${firstName}".
