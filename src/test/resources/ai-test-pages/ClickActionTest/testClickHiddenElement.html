<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Click Action Test - Hidden Element</title>
</head>
<body>
    <h1>Click Action Test</h1>
    
    <button id="btn-hidden" style="display:none;">Secret Admin Button</button>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('btn-hidden').addEventListener('click', function() {
            document.getElementById('result').innerText = 'Hidden button clicked!';
        });
    </script>
</body>
</html>
