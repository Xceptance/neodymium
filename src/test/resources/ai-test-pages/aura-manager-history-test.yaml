data:
  - testId: "History_List"
    before:
      - java startManager()
    steps: |
      Open ${auraManagerUrl} in the browser
      Click on the "History & Reports" navigation item
      Verify that the History view is displayed
      Verify that the history list contains the expected column headers like "Status", "Date & Time", and "Report"
    after:
      - java stopManager()
