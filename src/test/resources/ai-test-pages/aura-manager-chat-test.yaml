before:
  - java startManager()

after:
  - java stopManager()

steps: |
  Open ${auraManagerUrl} in the browser
  Verify the page title is "Neodymium Aura Manager"
  Enter "Hello Aura, what can you do?" into the chat input field
  Press the Enter key
  Verify the chat messages list contains "Hello Aura, what can you do?"
  Wait until the last chat message is from the AI
  
data:
  - testId: "Chat_Message"
