<div class="account-container" id="account-page-container">
    <!-- Left Navigation Sidebar -->
    <aside class="account-sidebar">
        <h3 style="font-family: var(--font-family-serif); font-size: 20px; margin-bottom: 24px; font-weight: 600;">Dashboard</h3>
        
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 12px; font-size: 14px;">
            <li><button onclick="showAccountTab('orders')" id="tab-btn-orders" style="font-weight: 600; color: var(--color-accent); text-align: left; width: 100%; display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 4px 0;"><svg class="icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> ${lang_orderHistory}</button></li>
            <li><button onclick="showAccountTab('addresses')" id="tab-btn-addresses" style="font-weight: 400; color: var(--color-text-secondary); text-align: left; width: 100%; display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 4px 0;"><svg class="icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> ${lang_manageAddresses}</button></li>
            <li><button onclick="showAccountTab('cards')" id="tab-btn-cards" style="font-weight: 400; color: var(--color-text-secondary); text-align: left; width: 100%; display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 4px 0;"><svg class="icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg> ${lang_manageCards}</button></li>
            <li><button onclick="showAccountTab('password')" id="tab-btn-password" style="font-weight: 400; color: var(--color-text-secondary); text-align: left; width: 100%; display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 4px 0;"><svg class="icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> ${lang_changePassword}</button></li>
            <li style="border-top: 1px solid var(--color-border); padding-top: 12px; margin-top: 8px;"><a href="api/auth/logout" style="color: var(--color-error); font-weight: 500; display: flex; align-items: center; gap: 8px;"><svg class="icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> ${lang_logout}</a></li>
        </ul>
    </aside>

    <!-- Right Dashboard Area -->
    <section class="account-main" id="account-dashboard-content">
        <!-- 1. Orders Tab -->
        <div class="account-tab-panel" id="tab-panel-orders">
            <h2 style="font-family: var(--font-family-serif); font-size: 24px; font-weight: 600; margin-bottom: 24px;">${lang_orderHistory}</h2>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                ${account_orders_html}
            </div>
        </div>

        <!-- 2. Address Book Tab -->
        <div class="account-tab-panel" id="tab-panel-addresses" style="display: none;">
            <h2 style="font-family: var(--font-family-serif); font-size: 24px; font-weight: 600; margin-bottom: 24px;">${lang_manageAddresses}</h2>
            
            <!-- Address listing -->
            <div id="address-list-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px;">
                ${account_addresses_html}
            </div>

            <!-- Add Address Form -->
            <div style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border); padding: 24px; border-radius: var(--border-radius); max-width: 500px;">
                <h3 style="font-family: var(--font-family-serif); font-size: 18px; margin-bottom: 16px;">Add New Address</h3>
                <form hx-post="api/auth/address/add" hx-target="#account-page-container" hx-swap="outerHTML">
                    <div class="form-group">
                        <label for="address-country" class="form-label">${lang_country}</label>
                        <select id="address-country" name="country" class="form-control" required
                                hx-get="api/address-form" hx-target="#address-form-fields" hx-trigger="change">
                            ${country_options_html}
                        </select>
                    </div>

                    <div id="address-form-fields">
                        ${address_fields_html}
                    </div>

                    <button type="submit" class="btn-primary" style="padding: 10px 20px; margin-top: 10px;">
                        ${lang_addAddress}
                    </button>
                </form>
            </div>
        </div>

        <!-- 3. Credit Cards Tab -->
        <div class="account-tab-panel" id="tab-panel-cards" style="display: none;">
            <h2 style="font-family: var(--font-family-serif); font-size: 24px; font-weight: 600; margin-bottom: 24px;">${lang_manageCards}</h2>
            
            <!-- Card listing -->
            <div id="card-list-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px;">
                ${account_cards_html}
            </div>

            <!-- Add Card Form -->
            <div style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border); padding: 24px; border-radius: var(--border-radius); max-width: 500px;">
                <h3 style="font-family: var(--font-family-serif); font-size: 18px; margin-bottom: 16px;">Add Credit Card</h3>
                <form hx-post="api/auth/card/add" hx-target="#account-page-container" hx-swap="outerHTML">
                    <div class="form-group">
                        <label for="cardType" class="form-label">${lang_cardType}</label>
                        <select id="cardType" name="cardType" class="form-control" required>
                            <option value="Visa">Visa</option>
                            <option value="Mastercard">Mastercard</option>
                            <option value="American Express">American Express</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cardNumber" class="form-label">${lang_cardNum}</label>
                        <input type="text" id="cardNumber" name="cardNumber" class="form-control" placeholder="1234 5678 1234 5100" required>
                    </div>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="cardExpiry" class="form-label">${lang_expiry}</label>
                            <input type="text" id="cardExpiry" name="cardExpiry" class="form-control" placeholder="12/28" required>
                        </div>
                        <div class="form-group">
                            <label for="cardCvv" class="form-label">${lang_cvv}</label>
                            <input type="text" id="cardCvv" name="cardCvv" class="form-control" placeholder="123" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="padding: 10px 20px; margin-top: 10px;">
                        ${lang_addCard}
                    </button>
                </form>
            </div>
        </div>

        <!-- 4. Change Password Tab -->
        <div class="account-tab-panel" id="tab-panel-password" style="display: none;">
            <h2 style="font-family: var(--font-family-serif); font-size: 24px; font-weight: 600; margin-bottom: 24px;">${lang_changePassword}</h2>
            
            <div style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border); padding: 24px; border-radius: var(--border-radius); max-width: 500px;">
                <div id="password-status-message" style="margin-bottom: 16px; font-weight: 600; color: var(--color-success);">${password_status}</div>
                <div id="password-error-message" style="margin-bottom: 16px; font-weight: 600; color: var(--color-error);">${password_error}</div>

                <form hx-post="api/auth/change-password" hx-target="#account-page-container" hx-swap="outerHTML">
                    <div class="form-group">
                        <label for="currentPassword" class="form-label">Current Password</label>
                        <input type="password" id="currentPassword" name="currentPassword" class="form-control" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" class="form-control" required minlength="6">
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" name="confirmNewPassword" class="form-control" required minlength="6">
                    </div>

                    <button type="submit" class="btn-primary" style="padding: 10px 20px;">
                        ${lang_save}
                    </button>
                </form>
            </div>
        </div>
    </section>
</div>

<script>
    function showAccountTab(tabName) {
        // Hide all tab panels
        document.querySelectorAll('.account-tab-panel').forEach(p => p.style.display = 'none');
        
        // Show selected tab panel
        const targetPanel = document.getElementById('tab-panel-' + tabName);
        if (targetPanel) {
            targetPanel.style.display = 'block';
        }

        // Reset sidebar button highlights
        const btns = ['orders', 'addresses', 'cards', 'password'];
        btns.forEach(b => {
            const btn = document.getElementById('tab-btn-' + b);
            if (btn) {
                if (b === tabName) {
                    btn.style.fontWeight = '600';
                    btn.style.color = 'var(--color-accent)';
                } else {
                    btn.style.fontWeight = '400';
                    btn.style.color = 'var(--color-text-secondary)';
                }
            }
        });

        // Store active tab in localStorage to preserve tab on swaps
        localStorage.setItem('verla_account_active_tab', tabName);
    }

    // Restore active tab on load/swap
    document.addEventListener('DOMContentLoaded', () => {
        const activeTab = localStorage.getItem('verla_account_active_tab') || 'orders';
        showAccountTab(activeTab);
    });

    document.addEventListener('htmx:afterSwap', (e) => {
        const activeTab = localStorage.getItem('verla_account_active_tab') || 'orders';
        showAccountTab(activeTab);
    });
</script>
