<div style="margin-bottom: 24px; font-size: 13px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">
    <a href="index.html" style="hover: color: var(--color-accent)">${lang_home}</a> &middot; 
    <a href="c/${product_category}.html">${product_category_name}</a> &middot; 
    <span style="color: var(--color-text-primary); font-weight: 500;">${product_name}</span>
</div>

<div class="pdp-container">
    <!-- Product Image (Large SVG Silhouette) -->
    <div class="pdp-image-wrapper">
        ${product_badge_html}
        <svg viewBox="0 0 100 100" style="width: 100%; max-width: 320px; height: auto; color: var(--color-accent);">
            ${product_svg_content}
        </svg>
    </div>

    <!-- Product Info Details -->
    <div class="pdp-info-wrapper">
        <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--color-text-secondary); letter-spacing: 0.1em; margin-bottom: 8px; display: block;">${product_subcategory_name}</span>
        <h1 style="font-family: var(--font-family-serif); font-size: 36px; font-weight: 600; line-height: 1.2; margin-bottom: 16px; color: var(--color-text-primary);">${product_name}</h1>
        
        <!-- Local Price Display -->
        <div style="font-size: 22px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 24px;">
            ${product_price_html}
        </div>

        <p style="color: var(--color-text-secondary); line-height: 1.7; margin-bottom: 30px; border-top: 1px solid var(--color-border); padding-top: 24px;">
            ${product_desc}
        </p>

        <!-- Add to Cart Form (HTMX Dynamic badge update) -->
        <form hx-post="api/cart/add" hx-target="#cart-btn-wrapper" hx-swap="outerHTML" style="border-top: 1px solid var(--color-border); padding-top: 24px;">
            <input type="hidden" name="productId" value="${product_id}">
            
            <div style="display: flex; gap: 24px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;">
                ${product_sizes_html}

                <div style="display: flex; gap: 12px; align-items: center;">
                    <label for="quantity" style="font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Quantity:</label>
                    <select name="quantity" id="quantity" style="padding: 10px 16px; border: 1px solid var(--color-border); border-radius: var(--border-radius); background: var(--color-bg-primary); outline: none; cursor: pointer;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 14px; display: flex; align-items: center; gap: 10px;">
                <svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2" ry="2"></rect><path d="M16 8a4 4 0 0 0-8 0"></path></svg> ${lang_addToCart}
            </button>
        </form>
    </div>
</div>
