<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Frame Content</title>
    <style>
        body {
            background-color: #0f1115;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 1.5rem;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .frame-card {
            background-color: #171923;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        h4 {
            margin: 0 0 0.5rem 0;
            color: #805ad5;
        }

        p {
            font-size: 0.85rem;
            color: #a0aec0;
            margin: 0 0 1rem 0;
        }

        .iframe-btn {
            background: linear-gradient(135deg, #805ad5, #319795);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .iframe-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(128, 90, 213, 0.4);
        }

        .iframe-btn:active {
            transform: translateY(0);
        }

        .status-indicator {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #48bb78;
            display: none;
        }
    </style>
</head>
<body>

    <div class="frame-card">
        <h4>Isolated Sandbox Sandbox</h4>
        <p id="iframe-message">This component is isolated within a sub-frame context to verify cross-boundary interaction.</p>
        
        <button class="iframe-btn" id="iframe-action-btn" onclick="triggerStatus()">Trigger Subpage Event</button>
        
        <div class="status-indicator" id="status-indicator">
            ✓ Internal Frame State Updated Successfully!
        </div>
    </div>

    <script>
        function triggerStatus() {
            const status = document.getElementById('status-indicator');
            const message = document.getElementById('iframe-message');
            status.style.display = 'block';
            message.innerText = "The sub-frame action was captured successfully! Aura can read this state.";
        }
    </script>

</body>
</html>
