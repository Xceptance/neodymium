<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Payment Form</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #fff;
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            padding: 10px;
            background: #00ffcc;
            border: none;
            border-radius: 4px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #00d4aa;
        }
        .status {
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <input type="text" id="cc-holder" placeholder="Cardholder Name">
        <input type="text" id="cc-number" placeholder="Card Number">
        <button id="cc-submit">Pay Now</button>
        <div id="iframe-status" class="status">Secure Checkout</div>
    </div>

    <script>
        document.getElementById('cc-submit').addEventListener('click', function() {
            const holder = document.getElementById('cc-holder').value;
            const number = document.getElementById('cc-number').value;
            const status = document.getElementById('iframe-status');

            if (holder && number) {
                status.innerText = 'Processing payment...';
                status.style.color = '#00ffcc';

                // Post message to parent origin
                window.parent.postMessage({
                    type: 'payment-submitted',
                    holder: holder
                }, '*');
            } else {
                status.innerText = 'Error: Fill all fields';
                status.style.color = '#ff3366';
            }
        });
    </script>
</body>
</html>
